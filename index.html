<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كار استايل | محمد الرباحي</title>
    <style>
        :root { --main-color: #e91e63; --bg-color: #0d0d0d; --card-bg: #1c1c1c; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 400px; text-align: center; }
        
        .profile-header { margin-top: 40px; margin-bottom: 20px; }
        
        .logo { 
            width: 115px; height: 115px; 
            border-radius: 50%; 
            border: 3px solid var(--main-color); 
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.3); 
            object-fit: cover;
            background: #222;
        }

        h1 { font-size: 24px; margin: 15px 0 5px 0; font-weight: 800; }
        .location-text { color: #888; font-size: 14px; margin-bottom: 35px; }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--card-bg); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            margin: 15px 0; 
            border-radius: 18px; 
            font-weight: 600; 
            border: 1px solid #333; 
            transition: 0.3s; 
            font-size: 17px; 
        }

        .btn:active { transform: scale(0.97); background: #252525; }
        
        .btn-whatsapp { border-right: 6px solid #25d366; }
        .btn-call { border-right: 6px solid #4285f4; }
        .btn-map { border-right: 6px solid #ea4335; }

        .footer { 
            margin-top: auto; 
            padding: 40px 0; 
            font-size: 13px; 
            color: #666; 
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img src="logo.png" onerror="this.src='https://ui-avatars.com/api/?name=Car+Style&background=e91e63&color=fff&size=128'" class="logo" alt="Logo">
            <h1>كار استايل (محمد الرباحي)</h1>
            <div class="location-text">الرياض - حي العمل - شارع الغرابي</div>
        </div>

        <a href="https://wa.me/966553368215?text=السلام عليكم، استفسار بخصوص خدمات كار استايل" class="btn btn-whatsapp">
            💬 تواصل مباشرة عبر واتساب
        </a>

        <a href="tel:966553368215" class="btn btn-call">
            📞 اتصل بنا للاستفسار
        </a>

        <a href="https://maps.app.goo.gl/wTrp4HLrwXq4uznr8" class="btn btn-map">
            📍 موقعنا في شارع الغرابي
        </a>

        <div class="footer">
            تصميم وبرمجة: علي صالح <br>
            خبير أنظمة ذكية
        </div>
    </div>
</body>
</html>
